<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed - CT Forum</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .feed-container {
            max-width: 800px;
            width: 100%;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light" style="background-color: #E9ECEF !important;">

<div th:replace="~{fragments :: header}"></div>

<main class="flex-grow-1 d-flex flex-column align-items-center p-4">
    <div class="feed-container mt-4">

        <!-- Novo cabeçalho com o botão de criar tópico -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 text-dark">Tópicos Recentes</h3>
            <a th:href="@{/create-topic}" class="btn btn-primary fw-bold rounded-pill px-4 shadow-sm" style="background-color: #0d6efd; border-color: #0d6efd;">
                <i class="bi bi-plus-lg me-1"></i> Novo Tópico
            </a>
        </div>

        <!-- Lista de Tópicos -->
        <th:block th:each="topic : ${topics.content}">
            <div th:replace="~{fragments :: topicCard(topic=${topic})}"></div>
        </th:block>

        <div th:if="${topics.empty}" class="text-center text-muted mt-5">
            Nenhum tópico encontrado. Seja o primeiro a criar um!
        </div>

        <!-- Paginação Atualizada para /feed -->
        <nav th:if="${topics.totalPages > 1}" aria-label="Navegação de tópicos" class="mt-4 mb-5">
            <ul class="pagination justify-content-center">

                <li class="page-item" th:classappend="${topics.first ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/feed(page=${topics.number - 1})}" tabindex="-1" th:attr="aria-disabled=${topics.first}">Anterior</a>
                </li>

                <li class="page-item" th:each="i : ${#numbers.sequence(0, topics.totalPages - 1)}" th:classappend="${topics.number == i ? 'active' : ''}">
                    <a class="page-link" th:href="@{/feed(page=${i})}" th:text="${i + 1}"></a>
                </li>

                <li class="page-item" th:classappend="${topics.last ? 'disabled' : ''}">
                    <a class="page-link" th:href="@{/feed(page=${topics.number + 1})}" th:attr="aria-disabled=${topics.last}">Próximo</a>
                </li>

            </ul>
        </nav>

    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
