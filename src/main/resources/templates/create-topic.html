<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Tópico - CT Forum</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .form-container {
            max-width: 600px;
            width: 100%;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light" style="background-color: #E9ECEF !important;">

    <div th:replace="~{fragments :: header}"></div>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center p-4">
        <div class="form-container">
            <h2 class="fw-bold mb-4">Criar Novo Tópico</h2>

            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

            <form th:action="@{/create-topic}" method="post">

                <div class="mb-3">
                    <label for="title" class="form-label fw-semibold">Título</label>
                    <input type="text" class="form-control bg-secondary-subtle border-0 py-2" id="title" name="title" th:value="${form?.title}" placeholder="Digite o título do tópico" required>
                </div>

                <div class="mb-3">
                    <label for="tags" class="form-label fw-semibold">Tags (separadas por vírgula)</label>
                    <input type="text" class="form-control bg-secondary-subtle border-0 py-2" id="tags" name="tags" th:value="${form?.tags}" placeholder="ex: tecnologia, java, spring">
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label fw-semibold">Conteúdo</label>
                    <textarea class="form-control bg-secondary-subtle border-0 py-2" id="content" name="content" rows="6" placeholder="Descreva sua dúvida ou assunto..." required th:text="${form?.content}"></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100 py-2 mb-3 fw-bold rounded-3" style="background-color: #218838; border-color: #218838;">
                    Publicar Tópico
                </button>

                <div class="text-center mt-4 text-dark" style="font-size: 0.9rem;">
                    <a th:href="@{/feed}" class="text-dark text-decoration-underline">Cancelar e voltar para o Feed</a>
                </div>

            </form>
        </div>
    </main>

    <div th:replace="~{fragments :: footer}"></div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
