<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fragments</title>
</head>
<body>

<header th:fragment="header" class="bg-dark text-white py-3">
    <div class="container-fluid d-flex flex-wrap align-items-center justify-content-between px-4">

        <a th:href="@{/feed}" class="d-flex align-items-center text-white text-decoration-none fw-bold fs-5 gap-2">
            <i class="bi bi-file-earmark-text-fill fs-4"></i>
            <span>CT Forum</span>
        </a>

        <div class="d-flex align-items-center gap-4">

            <form class="position-relative" action="#" th:action="@{/search}" method="get">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                <input type="search" name="q" class="form-control rounded-pill ps-5 pe-3" placeholder="Pesquisar" aria-label="Pesquisar">
            </form>

            <a th:href="@{/login}" class="text-white text-decoration-none fw-semibold">Login</a>

            <a th:href="@{/profile}" class="btn btn-primary rounded-pill d-flex align-items-center gap-2 px-3 fw-semibold">
                <i class="bi bi-person-fill"></i>
                <span>Perfil</span>
            </a>

        </div>
    </div>
</header>

<footer th:fragment="footer" class="bg-dark text-white py-4 mt-auto w-100">
    <div class="container d-flex justify-content-center align-items-center gap-5">

        <span class="text-white-50">&copy; 2026 CT Forum</span>

        <a th:href="@{/about}" class="text-white-50 text-decoration-none text-hover-white">About</a>

        <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="text-white-50 text-decoration-none text-hover-white d-flex align-items-center gap-2">
            <i class="bi bi-github fs-5"></i>
            <span>GitHub</span>
        </a>

    </div>
</footer>

<div th:fragment="topicCard(topic)" class="card border-0 shadow-sm rounded-4 mb-3 w-100">
    <div class="card-body d-flex align-items-center p-3">

        <div class="bg-secondary-subtle rounded-circle d-flex justify-content-center align-items-center fw-bold text-secondary flex-shrink-0" style="width: 48px; height: 48px; font-size: 1.2rem;" th:text="${topic.id()}">
            1
        </div>

        <div class="ms-3">
            <h5 class="card-title fw-bold mb-1 text-dark" th:text="${topic.title()}">
                Title
            </h5>

            <div class="d-flex align-items-center text-muted flex-wrap gap-2" style="font-size: 0.85rem;">
                <span class="fw-semibold text-dark">
                    <i class="bi bi-person-circle"></i> <span th:text="${topic.authorName()}">Autor</span>
                </span>

                <i class="bi bi-circle-fill" style="font-size: 0.3rem; color: #ccc;"></i>

                <div class="card-body p-3">
                    <div class="mt-3">
                        <div th:replace="~{fragments :: ratingButtons(post=${topic})}"></div>
                    </div>
                </div>

                <span>
                    <i class="bi bi-chat-left-text"></i> <span th:text="${topic.commentCount() + ' comentários'}">0 comentários</span>
                </span>

                <i class="bi bi-circle-fill" style="font-size: 0.3rem; color: #ccc;"></i>

                <span th:text="${'Criado em ' + #temporals.format(topic.createdAt(), 'dd/MM/yyyy HH:mm')}">Criado em 01/01/2026</span>

                <th:block th:if="${topic.isEdited()}">
                    <i class="bi bi-circle-fill" style="font-size: 0.3rem; color: #ccc;"></i>
                    <span class="text-secondary fst-italic" th:text="${'(Editado em ' + #temporals.format(topic.updatedAt(), 'dd/MM/yyyy HH:mm') + ')'}">(Editado em 01/01/2026)</span>
                </th:block>
            </div>
        </div>

    </div>
</div>

<div th:fragment="ratingButtons(post)" class="d-flex align-items-center gap-2">
    
    <form method="post" th:action="@{/post/{id}/rate(id=${post.id()})}" class="m-0 d-flex gap-2">
        
        <button type="submit" name="isPositive" value="true" class="btn btn-sm"
                th:classappend="${post.userVote() != null and post.userVote()} ? 'btn-primary' : 'btn-outline-secondary'"
                th:formaction="${post.userVote() != null and post.userVote()} ? @{/post/{id}/rate/remove(id=${post.id()})} : null"
                title="Gostei">
            <i class="bi bi-hand-thumbs-up-fill" th:if="${post.userVote() != null and post.userVote()}"></i>
            <i class="bi bi-hand-thumbs-up" th:unless="${post.userVote() != null and post.userVote()}"></i>
            <span th:text="${post.positiveCount()}">0</span>
        </button>

        <button type="submit" name="isPositive" value="false" class="btn btn-sm"
                th:classappend="${post.userVote() != null and !post.userVote()} ? 'btn-danger' : 'btn-outline-secondary'"
                th:formaction="${post.userVote() != null and !post.userVote()} ? @{/post/{id}/rate/remove(id=${post.id()})} : null"
                title="Não gostei">
            <i class="bi bi-hand-thumbs-down-fill" th:if="${post.userVote() != null and !post.userVote()}"></i>
            <i class="bi bi-hand-thumbs-down" th:unless="${post.userVote() != null and !post.userVote()}"></i>
            <span th:text="${post.negativeCount()}">0</span>
        </button>
        
    </form>
</div>

</body>
</html>
