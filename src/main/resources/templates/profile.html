<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${user.name()} + ' - CT Forum'">Perfil - CT Forum</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .profile-container {
            max-width: 800px;
            width: 100%;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light" style="background-color: #E9ECEF !important;">

<div th:replace="~{fragments :: header}"></div>

<main class="flex-grow-1 d-flex flex-column align-items-center p-4">
    <div class="profile-container mt-4">

        <!-- Navegação de volta para o feed -->
        <a th:href="@{/feed}" class="d-inline-flex align-items-center gap-2 text-muted text-decoration-none fw-semibold mb-3">
            <i class="bi bi-arrow-left"></i>
            <span>Voltar para o feed</span>
        </a>

        <!-- Cabeçalho do perfil -->
        <div class="card border-0 shadow-sm rounded-4 mb-4 w-100">
            <div class="card-body d-flex align-items-center p-4">

                <div class="bg-secondary-subtle rounded-circle d-flex justify-content-center align-items-center fw-bold text-secondary flex-shrink-0" style="width: 72px; height: 72px; font-size: 1.8rem;" th:text="${#strings.toUpperCase(#strings.substring(user.name(), 0, 1))}">
                    N
                </div>

                <div class="ms-4">
                    <h3 class="fw-bold mb-1 text-dark" th:text="${user.name()}">
                        Nome
                    </h3>
                    <div class="d-flex align-items-center text-muted gap-2" style="font-size: 0.9rem;">
                        <i class="bi bi-envelope"></i>
                        <span th:text="${user.email()}">email@exemplo.com</span>
                    </div>
                </div>

            </div>
        </div>

        <!-- Seção de tópicos criados pelo usuário -->
        <section>
            <h4 class="fw-bold text-dark mb-3">
                Tópicos Criados <span class="text-muted" th:text="'(' + ${topics.totalElements} + ')'">(0)</span>
            </h4>

            <th:block th:each="topic : ${topics.content}">
                <a th:href="@{/topic/{id}(id=${topic.id()})}" class="d-block text-decoration-none text-reset">
                    <div th:replace="~{fragments :: topicCard(topic=${topic})}"></div>
                </a>
            </th:block>

            <p th:if="${topics.empty}" class="text-muted fst-italic">
                Este usuário ainda não criou nenhum tópico.
            </p>

            
            <nav th:if="${topics.totalPages > 1}" aria-label="Navegação de tópicos" class="mt-4 mb-5">
                <ul class="pagination justify-content-center">

                    <li class="page-item" th:classappend="${topics.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{${baseUrl}(page=${topics.number - 1})}" tabindex="-1" th:attr="aria-disabled=${topics.first}">Anterior</a>
                    </li>

                    <li class="page-item" th:each="i : ${#numbers.sequence(0, topics.totalPages - 1)}" th:classappend="${topics.number == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{${baseUrl}(page=${i})}" th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${topics.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{${baseUrl}(page=${topics.number + 1})}" th:attr="aria-disabled=${topics.last}">Próximo</a>
                    </li>

                </ul>
            </nav>

        </section>

    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
