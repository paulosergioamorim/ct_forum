<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${topic.title()} + ' - CT Forum'">Tópico - CT Forum</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .topic-container {
            max-width: 800px;
            width: 100%;
        }

        .topic-content {
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light" style="background-color: #E9ECEF !important;">

<div th:replace="~{fragments :: header}"></div>

<main class="flex-grow-1 d-flex flex-column align-items-center p-4">
    <div class="topic-container mt-4">

        <a th:href="@{/feed}" class="d-inline-flex align-items-center gap-2 text-muted text-decoration-none fw-semibold mb-3">
            <i class="bi bi-arrow-left"></i>
            <span>Voltar para o feed</span>
        </a>

        <div class="card border-0 shadow-sm rounded-4 mb-4 w-100">
            <div class="card-body p-4">

                <div class="d-flex align-items-center">
                    <div class="bg-secondary-subtle rounded-circle d-flex justify-content-center align-items-center fw-bold text-secondary flex-shrink-0" style="width: 48px; height: 48px; font-size: 1.2rem;" th:text="${topic.id()}">
                        1
                    </div>

                    <h3 class="fw-bold mb-0 text-dark ms-3" th:text="${topic.title()}">
                        Título
                    </h3>
                </div>

                <div class="d-flex align-items-center text-muted flex-wrap gap-2 mt-2" style="font-size: 0.85rem;">
                    <span class="fw-semibold text-dark">
                        <i class="bi bi-person-circle"></i> <span th:text="${topic.authorName()}">Autor</span>
                    </span>

                    <i class="bi bi-circle-fill" style="font-size: 0.3rem; color: #ccc;"></i>

                    <span th:text="${'Criado em ' + #temporals.format(topic.createdAt(), 'dd/MM/yyyy HH:mm')}">Criado em 01/01/2026</span>

                    <th:block th:if="${topic.isEdited()}">
                        <i class="bi bi-circle-fill" style="font-size: 0.3rem; color: #ccc;"></i>
                        <span class="text-secondary fst-italic" th:text="${'(Editado em ' + #temporals.format(topic.updatedAt(), 'dd/MM/yyyy HH:mm') + ')'}">(Editado em 01/01/2026)</span>
                    </th:block>
                </div>

                <p class="topic-content text-dark mt-3 mb-0" th:text="${topic.content()}">
                    Conteúdo completo do tópico.
                </p>

                <div th:if="${topic.tags() != null and topic.tags().length > 0}" class="d-flex flex-wrap gap-2 mt-3">
                    <span th:each="tag : ${topic.tags()}" class="badge rounded-pill bg-primary-subtle text-primary fw-semibold px-3 py-2" th:text="'#' + ${tag}">#tag</span>
                </div>

            </div>
        </div>

        <div th:if="${usuarioAutenticado}" class="card border-0 shadow-sm rounded-4 mb-5 w-100">
            <div class="card-body p-4">
                <h5 class="fw-bold text-dark mb-3">Deixe sua resposta</h5>
                <form th:action="@{/topic/{id}/comment(id=${topic.id()})}" method="post" th:object="${newComment}">

                    <input type="hidden" th:field="*{parentId}" />

                    <div class="mb-3">
                        <textarea class="form-control bg-light border-0"
                                  rows="4"
                                  placeholder="Escreva seu comentário aqui..."
                                  th:field="*{content}"
                                  required></textarea>
                    </div>
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary fw-bold rounded-pill px-4 shadow-sm"
                                style="background-color: #0d6efd; border-color: #0d6efd;">
                            <i class="bi bi-send-fill me-1"></i> Responder
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${!usuarioAutenticado}" class="alert alert-secondary border-0 rounded-4 mb-5 text-center shadow-sm">
            Para participar da discussão e deixar um comentário, <a th:href="@{/login}" class="fw-bold text-decoration-none">faça o login</a>.
        </div>

        <section>
            <h4 class="fw-bold text-dark mb-4">
                Comentários <span class="text-muted" th:text="'(' + ${topic.comments().size()} + ')'">(0)</span>
            </h4>

            <p th:if="${topic.comments().isEmpty()}" class="text-muted fst-italic">
                Ainda não há comentários. Seja o primeiro a responder!
            </p>

            <th:block th:replace="~{fragments :: commentTree(${topic.comments()})}"></th:block>

        </section>

    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
