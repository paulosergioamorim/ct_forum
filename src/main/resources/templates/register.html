<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - CT Forum</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .form-container {
            max-width: 420px;
            width: 100%;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light" style="background-color: #E9ECEF !important;">

<div th:replace="~{fragments :: header}"></div>

<main class="flex-grow-1 d-flex justify-content-center align-items-center p-4">
    <div class="form-container">
        <h2 class="fw-bold mb-4">Cadastro</h2>

        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">

            <div class="mb-3">
                <label for="name" class="form-label fw-semibold">Nome</label>
                <input type="text" class="form-control bg-secondary-subtle border-0 py-2" id="name" name="name" th:value="${form?.name}" placeholder="Digite seu nome" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control bg-secondary-subtle border-0 py-2" id="email" name="email" th:value="${form?.email}" placeholder="Digite seu email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Senha</label>
                <input type="password" class="form-control bg-secondary-subtle border-0 py-2" id="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <div class="mb-4">
                <label for="passwordConfirm" class="form-label fw-semibold">Confirmar Senha</label>
                <input type="password" class="form-control bg-secondary-subtle border-0 py-2" id="passwordConfirm" name="passwordConfirm" placeholder="Confirme sua senha" required>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2 mb-3 fw-bold rounded-3" style="background-color: #218838; border-color: #218838;">
                Cadastrar
            </button>

            <div class="text-center mt-4 text-dark" style="font-size: 0.9rem;">
                <div>
                    Já possui uma conta? <a th:href="@{/login}" class="text-dark text-decoration-underline">Faça login aqui.</a>
                </div>
            </div>

        </form>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
